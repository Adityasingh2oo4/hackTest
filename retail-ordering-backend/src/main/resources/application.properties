spring.application.name=retail-ordering-backend

# Database Config - MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/retail_db
spring.datasource.username=root
spring.datasource.password=root

# JPA / Hibernate Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Config (Secret Key should be long enough for HS256, e.g., 256 bits / 32 chars)
app.jwt.secret=MySuperSecretKeyForRetailOrderingAppWhichIsLongEnough0123456789
app.jwt.expiration-ms=86400000

# Swagger Config (optional path customized)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
