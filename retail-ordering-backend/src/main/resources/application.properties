spring.application.name=retail-ordering-backend

server.port=${PORT:8080}

spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:retail_db}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:root}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.jwt.secret=${JWT_SECRET:MySuperSecretKeyForRetailOrderingAppWhichIsLongEnough0123456789}
app.jwt.expiration-ms=86400000

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://retail-ordering.netlify.app}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
